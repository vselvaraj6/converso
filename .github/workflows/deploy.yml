name: Deploy to homelab

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted
    timeout-minutes: 15

    env:
      COMPOSE_PROJECT_NAME: converso
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Write .env from GitHub Secrets
        run: |
          cat > .env <<'ENVEOF'
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL=gpt-3.5-turbo
          VAPI_API_KEY=${{ secrets.VAPI_API_KEY }}
          VAPI_BASE_URL=https://api.vapi.ai
          CALCOM_BASE_URL=${{ secrets.CALCOM_BASE_URL }}
          CALCOM_API_KEY=${{ secrets.CALCOM_API_KEY }}
          CALCOM_WEBHOOK_SECRET=${{ secrets.CALCOM_WEBHOOK_SECRET }}
          ENVEOF

      - name: Fix Docker networking
        run: |
          echo "→ Recreating missing Docker isolation chains (if missing)..."
          sudo iptables -L DOCKER-ISOLATION-STAGE-1 >/dev/null 2>&1 || {
            sudo iptables -N DOCKER-ISOLATION-STAGE-1
            sudo iptables -A FORWARD -j DOCKER-ISOLATION-STAGE-1
            sudo iptables -A DOCKER-ISOLATION-STAGE-1 -j RETURN
          }
          sudo iptables -L DOCKER-ISOLATION-STAGE-2 >/dev/null 2>&1 || {
            sudo iptables -N DOCKER-ISOLATION-STAGE-2
            sudo iptables -A DOCKER-ISOLATION-STAGE-1 ! -i docker0 -o docker0 -j DOCKER-ISOLATION-STAGE-2
            sudo iptables -A DOCKER-ISOLATION-STAGE-2 -j RETURN
          }

      - name: Run Tests
        run: |
          echo "→ Starting stack for testing..."
          docker compose build
          docker compose up -d
          
          echo "→ Waiting for services to be healthy..."
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U converso; then
              echo "Database is ready."
              break
            fi
            echo "  waiting for postgres... $i/30"
            sleep 2
          done

          echo "→ Resetting test database..."
          docker compose exec -T -e PGPASSWORD=password postgres psql -U converso -d postgres -c "DROP DATABASE IF EXISTS test_converso;"
          docker compose exec -T -e PGPASSWORD=password postgres psql -U converso -d postgres -c "CREATE DATABASE test_converso;"
          
          echo "→ Running pytest suite..."
          docker compose exec -T \
            -e APP_ENV=testing \
            -e DATABASE_URL=postgresql+asyncpg://converso:password@postgres:5432/test_converso \
            -e REDIS_URL=redis://redis:6379/15 \
            app pytest || { 
              echo "!!! TESTS FAILED !!!"
              docker compose logs --tail=100 app
              exit 1
            }

      - name: Rebuild and restart containers
        run: |
          echo "→ Rebuilding containers (clean build)..."
          docker compose build --no-cache
          docker compose up -d --remove-orphans
          docker compose restart nginx
          echo "→ Waiting for database..."
          sleep 20
          docker compose exec -T app alembic upgrade head
          docker image prune -f

      - name: Health check
        run: |
          echo "→ Waiting for app to be ready on port 8080..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8080/api/health; then
              echo "Health check passed."
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 60s!" >&2
          docker compose logs --tail=50 app >&2
          exit 1

      - name: Notify success
        if: success()
        run: echo "✓ Converso deployed successfully at $(date)"

      - name: Notify failure
        if: failure()
        run: echo "✗ Deployment FAILED at $(date)" >&2
