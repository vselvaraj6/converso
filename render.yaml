services:
  # Web service
  - type: web
    name: converso-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: converso-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: converso-redis
          property: connectionString
      - fromGroup: converso-secrets
    healthCheckPath: /api/health
    
  # Background worker
  - type: worker
    name: converso-worker
    runtime: docker
    dockerCommand: celery -A app.tasks.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: converso-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: converso-redis
          property: connectionString
      - fromGroup: converso-secrets
    
  # Scheduler
  - type: worker
    name: converso-scheduler
    runtime: docker
    dockerCommand: celery -A app.tasks.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: converso-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: converso-redis
          property: connectionString
      - fromGroup: converso-secrets

databases:
  - name: converso-db
    databaseName: converso
    user: converso
    plan: starter

envVarGroups:
  - name: converso-secrets
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false