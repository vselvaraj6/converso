services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: converso
      POSTGRES_USER: converso
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U converso"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cal.com (Self-Hosted) ───────────────────────────────────────────────────

  calcom:
    image: calcom/cal.com:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://converso:password@postgres:5432/calcom
      - DATABASE_DIRECT_URL=postgresql://converso:password@postgres:5432/calcom
      - NEXT_PUBLIC_WEBAPP_URL=http://localhost:3001
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=ae26ea82931508da3127a968a64184c1
      - CALENDSO_ENCRYPTION_KEY=ae26ea82931508da3127a968a64184c1
      - NEXT_PUBLIC_IS_E2E=1
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    # Fix for internal NextAuth fetch failure
    extra_hosts:
      - "localhost:127.0.0.1"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Backend ─────────────────────────────────────────────────────────────────

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://converso:password@postgres:5432/converso
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      UVICORN_EXTRA_ARGS: --reload --port 8001
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: ./start.sh

  celery-worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://converso:password@postgres:5432/converso
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - app
      - redis
      - postgres
    volumes:
      - .:/app
    command: celery -A app.tasks.celery_app worker --loglevel=info

  celery-beat:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://converso:password@postgres:5432/converso
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - app
      - redis
      - postgres
    volumes:
      - .:/app
    command: celery -A app.tasks.celery_app beat --loglevel=info -s /tmp/celerybeat-schedule

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_URL: http://app:8001
      NODE_ENV: production
    depends_on:
      - app

  # ── Reverse proxy (single entry point) ──────────────────────────────────────

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
      - frontend

volumes:
  postgres_data:
  redis_data:
